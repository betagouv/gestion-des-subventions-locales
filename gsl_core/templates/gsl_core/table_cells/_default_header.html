{% load gsl_filters dsfr_tags %}

{{ column.label }}

{% if column.aggregate_key and aggregates %}
    <br>
    <span class="gsl-money gsl-projet-table__total gsl-projet-table__total--{{ column.aggregate_key }}"
          {% if column.aggregate_id %}id="{{ column.aggregate_id }}"{% endif %}>{{ aggregates|lookup:column.aggregate_key|euro:0 }}</span>
{% endif %}

{% if column.header_help_text %}
    <br>
    {% dsfr_tooltip content=column.header_help_text is_clickable=True %}
{% endif %}
