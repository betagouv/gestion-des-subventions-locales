{% extends "base.html" %}

{% block content %}
    <h1>
        {{ title }}
    </h1>
    <div class="fr-grid-row">
        <div class="fr-col-12 fr-col-md-6">
            <form method="POST">
                {% csrf_token %}
                {{ form }}
                <div class="fr-btns-group fr-btns-group--inline fr-mt-2w">
                    <button class="fr-btn" type="submit">
                        Renommer
                    </button>
                    <a class="fr-btn fr-btn--secondary"
                       href="{{ next_url|default:object.get_absolute_url }}">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
