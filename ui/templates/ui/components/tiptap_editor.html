<div data-controller="tiptap-editor"
     data-tiptap-editor-content-field-name-value="{{ self.content_field_name }}"
     data-tiptap-editor-with-mention-value="{{ self.with_mention }}"
     data-tiptap-editor-mentions-value="{{ self.json_mention_items }}">
    <div id="toolbar">
        <div class="toolbar-buttons-group">
            <button class="fr-icon-arrow-go-back-line"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="undo"
                    type="button">
            </button>
            <button class="fr-icon-arrow-go-forward-line"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="redo"
                    type="button">
            </button>
        </div>

        <div class="toolbar-buttons-group">
            <button class="fr-icon-h-1"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="heading"
                    data-level="1"
                    type="button">
            </button>
            <button class="fr-icon-h-2"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="heading"
                    data-level="2"
                    type="button">
            </button>
        </div>

        <div class="toolbar-buttons-group">
            <button class="fr-icon-bold"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="bold"
                    type="button">
            </button>
            <button class="fr-icon-italic"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="italic"
                    type="button">
            </button>
            <button class="fr-icon-underline"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="underline"
                    type="button">
            </button>
            <button class="fr-icon-mark-pen-line"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="highlight"
                    type="button">
            </button>
        </div>

        <div class="toolbar-buttons-group">
            <button class="fr-icon-list-unordered"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="bulletList"
                    type="button">
            </button>
            <button class="fr-icon-list-ordered"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="orderedList"
                    type="button">
            </button>
        </div>

        <div class="toolbar-buttons-group">
            <button class="fr-icon-align-left"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="align"
                    data-align="left"
                    type="button">
            </button>
            <button class="fr-icon-align-center"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="align"
                    data-align="center"
                    type="button">
            </button>
            <button class="fr-icon-align-justify"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="align"
                    data-align="justify"
                    type="button">
            </button>
            <button class="fr-icon-align-right"
                    data-tiptap-editor-target="toolbarButton"
                    data-action="align"
                    data-align="right"
                    type="button">
            </button>
        </div>
        <div class="toolbar-buttons-group">
            <details class="new-gsl-dropdown">
                <summary class="fr-btn fr-btn--tertiary fr-btn--icon-right fr-icon-arrow-down-s-line fr-py-0 fr-ml-2w">
                    Tableau
                </summary>
                <ul class="new-gsl-dropdown-content no-list-style tiptap-dropdown-list fr-m-0 fr-ml-2w">
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="insertTable"
                                type="button">
                            Insérer un tableau
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="addColumnBefore"
                                type="button">
                            Colonne avant
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="addColumnAfter"
                                type="button">
                            Colonne après
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="deleteColumn"
                                type="button">
                            Supprimer colonne
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="addRowBefore"
                                type="button">
                            Ligne avant
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="addRowAfter"
                                type="button">
                            Ligne après
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="deleteRow"
                                type="button">
                            Supprimer ligne
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="toggleHeaderColumn"
                                type="button">
                            En-tête colonne
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="toggleHeaderRow"
                                type="button">
                            En-tête ligne
                        </button>
                    </li>
                    <li class="tiptap-dropdown-item">
                        <button data-tiptap-editor-target="toolbarButton"
                                data-action="mergeOrSplit"
                                type="button">
                            Fusionner/Diviser
                        </button>
                    </li>
                </ul>
            </details>
        </div>
        {% if self.with_mention %}
            <div class="toolbar-buttons-group">
                <details class="new-gsl-dropdown"
                         data-tiptap-editor-target="mentionDropdown"
                         data-action="click@document->tiptap-editor#clickOutside">
                    <summary class="fr-btn fr-btn--tertiary fr-btn--icon-right fr-icon-arrow-down-s-line fr-py-0 fr-ml-2w">
                        Insérer une variable de publipostage
                    </summary>
                    <ul class="new-gsl-dropdown-content no-list-style tiptap-dropdown-list fr-m-0 fr-ml-2w"
                        data-action="click->">
                        {% for mention in self.mentions %}
                            <li class="tiptap-dropdown-item">
                                <button data-action="click->tiptap-editor#insertMention"
                                        data-id="{{ mention.id }}"
                                        type="button">
                                    {{ mention.label }}
                                </button>
                            </li>
                        {% endfor %}
                    </ul>
                </details>
            </div>
        {% endif %}
    </div>
    <div id="editor" data-tiptap-editor-target="editor">
    </div>
</div>
