{% load dsfr_tags %}
<button id="{{ modal_button_id }}"
        aria-controls="{{ modal_id }}"
        type="button"
        hidden
        data-fr-opened="false">
</button>
<dialog class="fr-modal"
        id="{{ modal_id }}"
        aria-labelledby="{{ modal_id }}-title">
    <div class="fr-container fr-container--fluid fr-container-md">
        <div class="fr-grid-row fr-grid-row--center">
            <div class="fr-col-12 fr-col-md-8 fr-col-lg-6">
                <div class="fr-modal__body">
                    <div class="fr-modal__header">
                        <button aria-controls="{{ modal_id }}"
                                title="Fermer"
                                type="button"
                                class="fr-btn--close fr-btn">
                            Fermer
                        </button>
                    </div>
                    <div id="{{ modal_id }}-step">
                        <div class="fr-modal__content">
                            <h1 class="fr-modal__title" id="{{ modal_id }}-title">
                                Générer les documents
                            </h1>
                            {% dsfr_stepper current_step_id=1 total_steps=3 current_step_title="Types de document" next_step_title="Choix des modèles" %}
                            <form id="{{ modal_id }}-step1-form"
                                  hx-post="{% url 'gsl_notification:generate-documents-modal-step2' dotation %}"
                                  hx-target="#{{ modal_id }}-step"
                                  hx-swap="outerHTML">
                                {% csrf_token %}
                                <input type="hidden" name="ids" value="{{ ids }}">
                                <fieldset class="fr-fieldset" id="{{ modal_id }}-doc-type-fieldset">
                                    <legend class="fr-fieldset__legend--regular fr-fieldset__legend">
                                        Documents à générer
                                    </legend>
                                    <div class="fr-fieldset__content">
                                        <div class="fr-radio-group">
                                            <input type="radio"
                                                   name="document_type"
                                                   id="{{ modal_id }}-type-arrete"
                                                   value="arrete"
                                                   checked>
                                            <label class="fr-label" for="{{ modal_id }}-type-arrete">
                                                Les arrêtés
                                            </label>
                                        </div>
                                        <div class="fr-radio-group">
                                            <input type="radio"
                                                   name="document_type"
                                                   id="{{ modal_id }}-type-lettre"
                                                   value="lettre">
                                            <label class="fr-label" for="{{ modal_id }}-type-lettre">
                                                Les lettres de notification
                                            </label>
                                        </div>
                                    </div>
                                </fieldset>
                            </form>
                        </div>
                        <div class="fr-modal__footer">
                            <ul class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg">
                                <li>
                                    <button type="submit" form="{{ modal_id }}-step1-form" class="fr-btn">
                                        Continuer <span class="fr-icon-arrow-right-s-line" aria-hidden="true"></span>
                                    </button>
                                </li>
                                <li>
                                    <button class="fr-btn fr-btn--secondary"
                                            aria-controls="{{ modal_id }}"
                                            type="button">
                                        Annuler
                                    </button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</dialog>
