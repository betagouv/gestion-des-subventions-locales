{% load dsfr_tags %}
<div id="{{ modal_id }}-step">
    <form style="display:none"
          hx-post="{% url 'gsl_notification:generate-documents-modal-create' dotation %}"
          hx-trigger="load"
          hx-target="#{{ modal_id }}-step"
          hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="ids" value="{{ ids }}">
        <input type="hidden" name="document_type" value="{{ document_type }}">
        {% if document_type == "arrete_et_lettre" %}
            <input type="hidden" name="modele_arrete_id" value="{{ modele_arrete_id }}">
            <input type="hidden" name="modele_lettre_id" value="{{ modele_lettre_id }}">
        {% else %}
            <input type="hidden" name="modele_id" value="{{ modele_id }}">
        {% endif %}
    </form>
    <div class="fr-modal__content">
        <h1 class="fr-modal__title" id="{{ modal_id }}-title">
            Générer les documents
        </h1>
        {% dsfr_stepper current_step_id=3 total_steps=3 current_step_title="Téléchargement" %}
        <div class="fr-alert fr-alert--info fr-mt-3w"
             role="status"
             aria-live="polite">
            <p>
                {{ doc_count }} document{{ doc_count|pluralize }} en cours de génération…
            </p>
        </div>
        <div class="fr-mt-3w fr-text--center">
            <span class="fr-icon-refresh-line generate-docs-spinner" aria-hidden="true"></span>
        </div>
    </div>
    <div class="fr-modal__footer">
        <ul class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg fr-btns-group--icon-right ">
            <li>
                <button class="fr-btn fr-btn--secondary fr-icon-download-line fr-icon--sm"
                        type="button"
                        disabled>
                    Télécharger
                </button>
            </li>
            <li>
                <button class="fr-btn fr-btn--tertiary"
                        aria-controls="{{ modal_id }}"
                        type="button">
                    Fermer
                </button>
            </li>
        </ul>
    </div>
</div>
