{% load dsfr_tags %}
<div id="{{ modal_id }}-step">
    <div class="fr-modal__content">
        <h1 class="fr-modal__title" id="{{ modal_id }}-title">
            Générer les documents
        </h1>
        {% dsfr_stepper current_step_id=3 total_steps=3 current_step_title="Téléchargement" %}
        <div class="fr-alert fr-alert--success fr-mt-3w" role="status">
            <p>
                {{ doc_count }} {{ doc_name }} généré{{ doc_count|pluralize:"s" }} dans un document PDF
            </p>
        </div>
    </div>
    <div class="fr-modal__footer">
        <ul class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg">
            <li>
                <a class="fr-btn" href="{{ download_url }}">
                    Télécharger <span class="fr-icon-download-line fr-icon--sm fr-pl-1w" aria-hidden="true"></span>

                </a>
            </li>
            <li>
                <button class="fr-btn fr-btn--tertiary"
                        aria-controls="{{ modal_id }}"
                        type="button">
                    Fermer
                </button>
            </li>
        </ul>
    </div>
</div>
