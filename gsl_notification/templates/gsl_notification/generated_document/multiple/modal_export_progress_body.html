{% load dsfr_tags %}
<div id="{{ modal_id }}-step"
     hx-get="{% url 'gsl_notification:generate-documents-status' dotation task_id %}?doc_count={{ doc_count }}"
     hx-trigger="every 2s"
     hx-swap="outerHTML"
     hx-target="this">
    <div class="fr-modal__content">
        <h1 class="fr-modal__title" id="{{ modal_id }}-title">
            Générer les documents
        </h1>
        {% dsfr_stepper current_step_id=4 total_steps=4 current_step_title="Téléchargement" %}
        <div class="fr-alert fr-alert--info fr-mt-3w"
             role="status"
             aria-live="polite">
            <p>
                {{ doc_count }} document{{ doc_count|pluralize }} en cours de génération…
            </p>
        </div>
        <div class="fr-mt-3w fr-grid-row fr-grid-row--gutters fr-grid-row--center"
             aria-hidden="true">
            <span class="fr-icon-refresh-line generate-docs-spinner"></span>
        </div>
    </div>
    <div class="fr-modal__footer">
        <ul class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg fr-btns-group--icon-right">
            <li>
                <button class="fr-btn fr-btn--secondary fr-icon-download-line fr-icon--sm"
                        type="button"
                        disabled>
                    Télécharger
                </button>
            </li>
            <li>
                <button class="fr-btn fr-btn--tertiary"
                        aria-controls="{{ modal_id }}"
                        type="button">
                    Fermer
                </button>
            </li>
        </ul>
    </div>
</div>
